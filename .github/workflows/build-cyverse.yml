# Build LANDIS-II v8 base + CyVerse image on GitHub (ubuntu-latest = native linux/amd64).
# No --platform needed here; image is amd64 by default. Use --platform linux/amd64 only when
# building on Mac (see buildDockerImage.sh) so the image runs on CyVerse.
name: Build LANDIS-II v8 CyVerse image

on:
  push:
    branches: [main]
    paths:
      - 'Clean_Docker_LANDIS-II_8_AllExtensions/**'
      - '.github/workflows/build-cyverse.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  LANDIS_CONTEXT: Clean_Docker_LANDIS-II_8_AllExtensions

jobs:
  build-cyverse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base LANDIS-II v8 image
        run: |
          cd ${{ env.LANDIS_CONTEXT }}
          docker build -t landis-ii_v8_linux .

      - name: Build CyVerse image
        run: |
          cd ${{ env.LANDIS_CONTEXT }}
          docker build -f CyVerse/Dockerfile -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/landis-ii-v8-cyverse:latest .

      - name: Push CyVerse image to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/landis-ii-v8-cyverse:latest
